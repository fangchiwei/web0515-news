name: Daily News Cache

on:
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

jobs:
  cache-news:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger news cache job
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $NEWS_JOB_TOKEN" \
            "$NEWS_CACHE_JOB_URL"
        env:
          NEWS_CACHE_JOB_URL: ${{ secrets.NEWS_CACHE_JOB_URL }}
          NEWS_JOB_TOKEN: ${{ secrets.NEWS_JOB_TOKEN }}
